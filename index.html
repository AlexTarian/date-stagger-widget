<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Arrival Stagger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
  <style>
    :root {
      --r: 12px;
      --b: 1px solid #e5e7eb;
      --pad: 14px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: var(--pad);
      background: #fafafa;
      font: 14px var(--font);
      color: #111;
    }

    .card {
      width: 100%;
      margin: 0;
      background: #fff;
      border: var(--b);
      border-radius: var(--r);
      box-shadow: 0 6px 20px rgba(0, 0, 0, .06);
      overflow: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px var(--pad);
      background: #fbfbfc;
      border-bottom: var(--b);
    }

    h1 {
      font-size: 15px;
      margin: 0;
      font-weight: 600;
    }

    .meta {
      font-size: 12px;
      color: #6b7280;
    }

    .content {
      padding: var(--pad);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 8px;
      text-align: left;
    }

    th {
      font-size: 12px;
      color: #52525b;
      border-bottom: var(--b);
    }

    tr + tr td {
      border-top: var(--b);
    }

    input[type="date"],
    input[type="number"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #d4d4d8;
      border-radius: 10px;
      outline: none;
    }

    input.zero {
      border-color: #b00020;
      color: #b00020;
      background: #fff5f5;
    }

    .row-actions {
      display: flex;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid #d4d4d8;
      background: #fff;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn.primary {
      background: #0047AB;
      border-color: #0047AB;
      color: #fff;
    }

    .btn.danger {
      background: #c62828;
      border-color: #c62828;
      color: #fff;
    }

    .btn[disabled] {
      opacity: .5;
      cursor: not-allowed;
    }

    .footer {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .footer-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .pill {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
    }

    .hint {
      font-size: 12px;
      color: #6b7280;
    }

    .error {
      color: #b00020;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="card">
    <header>
      <h1>Staggered Start Dates v10</h1>
      <div class="meta" id="meta">Start — End • — workers</div>
    </header>

    <div class="content">
      <table>
        <thead>
          <tr>
            <th style="width:60%">Arrival date</th>
            <th style="width:30%"># of workers</th>
            <th style="width:10%"></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>

      <div class="footer">
        <div class="footer-group">
          <button class="btn primary" id="addRow" type="button">+ Add arrival</button>
          <span class="hint">Minimum 2 rows. No max.</span>
        </div>

        <div class="footer-group">
          <span class="pill">Total selected: <strong id="totalSelected">0</strong></span>
          <span class="pill">Requested: <strong id="totalAllowed">—</strong></span>
        </div>
      </div>

      <div id="status" class="hint" style="margin-top:8px"></div>
    </div>
  </div>

<script>
(function () {
  const $ = (id) => document.getElementById(id);

  const state = {
    startDate: '',
    endDate: '',
    totalWorkers: null,
    values: [],
    minRows: 2
  };

  let pending = {};
  let updateTimer = null;
  let lastSentPayload = '';

  const sourceIds = {
    start: null,
    end: null,
    workers: null,
    visibility: null
  };

  function clean(value) {
    return String(value ?? '').trim();
  }

  function toQID(raw) {
    const value = clean(raw && (raw.value ?? raw)).replace(/^#/, '');
    const match =
      value.match(/^input_(\d+)$/i) ||
      value.match(/^q(\d+)$/i) ||
      value.match(/^(\d+)$/);

    return match ? match[1] : null;
  }

  function selectorsFor(qid, { includeDateParts = false } = {}) {
    const id = toQID(qid);
    if (!id) return [];

    const selectors = [String(id), `input_${id}`, `q${id}`];

    if (includeDateParts) {
      selectors.push(
        `month_${id}`,
        `day_${id}`,
        `year_${id}`,
        `lite_mode_${id}`,
        `input_${id}_pick`
      );
    }

    return Array.from(new Set(selectors));
  }

  function extractValue(payload) {
    if (payload == null) return '';

    if (['string', 'number', 'boolean'].includes(typeof payload)) {
      return String(payload);
    }

    if (Array.isArray(payload)) {
      return payload.map(extractValue).filter(Boolean).join(' ');
    }

    if (typeof payload === 'object') {
      if (payload.value && typeof payload.value === 'object') {
        return extractValue(
          payload.value.value ??
          payload.value.text ??
          payload.value.answer
        );
      }

      return extractValue(
        payload.value ??
        payload.data ??
        payload.text ??
        payload.answer
      );
    }

    return '';
  }

  function toPositiveIntegerOrNull(value) {
    const text = clean(value);
    if (!text) return null;

    const number = Number(text);
    if (!Number.isFinite(number) || number <= 0) return null;

    return Math.floor(number);
  }

  function toISO(value) {
    const text = clean(value);
    if (!text) return '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;

    const parts = text.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (parts) {
      const [, mm, dd, yyyy] = parts;
      return `${yyyy}-${String(mm).padStart(2, '0')}-${String(dd).padStart(2, '0')}`;
    }

    const parsed = new Date(text);
    return Number.isNaN(parsed.getTime()) ? '' : parsed.toISOString().slice(0, 10);
  }

  function fromISOToNice(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    return `${m}/${d}/${y}`;
  }

  function nextDay(iso) {
    if (!iso) return '';

    const date = new Date(`${iso}T00:00:00Z`);
    if (Number.isNaN(date.getTime())) return '';

    date.setUTCDate(date.getUTCDate() + 1);
    return date.toISOString().slice(0, 10);
  }

  function clampDate(iso) {
    if (!iso) return '';
    if (state.startDate && iso < state.startDate) return state.startDate;
    if (state.endDate && iso > state.endDate) return state.endDate;
    return iso;
  }

  function sum() {
    return state.values.reduce((total, row) => total + (Number(row.count) || 0), 0);
  }

  function workerLabel() {
    return state.totalWorkers == null ? '—' : String(state.totalWorkers);
  }

  function atWorkerCap() {
    return state.totalWorkers != null && sum() >= state.totalWorkers;
  }

  function ensureMinRows() {
    while (state.values.length < state.minRows) {
      state.values.push({ date: '', count: 0 });
    }
  }

  function extractDateFromResponseData(data, qid) {
    const id = toQID(qid);
    if (!id || !Array.isArray(data)) return '';

    const parts = {};

    data.forEach((item) => {
      const selector = String(item.selector || '');
      const value = extractValue(item.value);

      if (selector === `month_${id}`) parts.month = value;
      if (selector === `day_${id}`) parts.day = value;
      if (selector === `year_${id}`) parts.year = value;
      if (selector === `lite_mode_${id}`) parts.lite = value;
      if (selector === `input_${id}` || selector === `input_${id}_pick`) parts.input = value;
    });

    if (parts.month && parts.day && parts.year) {
      return `${String(parts.month).padStart(2, '0')}/${String(parts.day).padStart(2, '0')}/${parts.year}`;
    }

    return parts.input || parts.lite || '';
  }

  function findFieldValue(res, qid, { isDate = false } = {}) {
    if (!qid) return '';

    if (isDate && res?.type === 'event:receiver' && Array.isArray(res.data)) {
      const dateValue = extractDateFromResponseData(res.data, qid);
      if (dateValue) return dateValue;
    }

    const selectors = selectorsFor(qid, { includeDateParts: isDate });

    if (res?.type === 'event:receiver' && Array.isArray(res.data)) {
      for (const selector of selectors) {
        const item = res.data.find((row) => String(row.selector) === selector);
        if (item) return extractValue(item.value);
      }
    }

    if (res && typeof res === 'object') {
      for (const selector of selectors) {
        if (res[selector] !== undefined) return extractValue(res[selector]);
      }
    }

    return '';
  }

  function readFields(callback) {
    const selectors = [
      ...selectorsFor(sourceIds.start, { includeDateParts: true }),
      ...selectorsFor(sourceIds.end, { includeDateParts: true }),
      ...selectorsFor(sourceIds.workers)
    ];

    const uniqueSelectors = Array.from(new Set(selectors)).filter(Boolean);
    if (!uniqueSelectors.length) return callback({});

    try {
      JFCustomWidget.getFieldsValueById(uniqueSelectors, (res) => {
        callback({
          startDate: findFieldValue(res, sourceIds.start, { isDate: true }),
          endDate: findFieldValue(res, sourceIds.end, { isDate: true }),
          totalWorkers: findFieldValue(res, sourceIds.workers)
        });
      });
    } catch (_) {
      callback({});
    }
  }

  function queueUpdate(partial) {
    pending = { ...pending, ...partial };
    clearTimeout(updateTimer);

    updateTimer = setTimeout(() => {
      const update = pending;
      pending = {};
      applyUpdate(update);
    }, 75);
  }

  function refreshFromSourceFields() {
    readFields((raw) => {
      queueUpdate({
        startDate: raw.startDate || undefined,
        endDate: raw.endDate || undefined,
        totalWorkers: raw.totalWorkers || undefined
      });
    });
  }

  function applyUpdate({ startDate, endDate, totalWorkers }) {
    const nextStart = startDate !== undefined ? toISO(startDate) : state.startDate;
    const nextEnd = endDate !== undefined ? toISO(endDate) : state.endDate;
    const parsedWorkers = totalWorkers !== undefined ? toPositiveIntegerOrNull(totalWorkers) : state.totalWorkers;
    const nextWorkers = parsedWorkers ?? state.totalWorkers;

    if (
      nextStart === state.startDate &&
      nextEnd === state.endDate &&
      nextWorkers === state.totalWorkers
    ) {
      return;
    }

    state.startDate = nextStart;
    state.endDate = nextEnd;
    state.totalWorkers = nextWorkers;

    normalizeRows();
    render();
    validateAndSend();
  }

  function suggestSecondArrivalDate() {
    if (!state.startDate || !state.endDate) return '';

    const start = new Date(`${state.startDate}T00:00:00Z`);
    const end = new Date(`${state.endDate}T00:00:00Z`);

    if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime()) || end <= start) return '';

    const mid = new Date(start.getTime() + (end - start) * (2 / 3));
    const monthStart = new Date(Date.UTC(mid.getUTCFullYear(), mid.getUTCMonth(), 1));
    const minimum = new Date(`${nextDay(state.startDate)}T00:00:00Z`);

    const picked = new Date(Math.min(Math.max(monthStart, minimum), end));
    return picked.toISOString().slice(0, 10);
  }

  function normalizeRows() {
    ensureMinRows();

    if (state.startDate) {
      state.values[0].date = state.startDate;
    }

    if (state.values[1] && !state.values[1].date) {
      state.values[1].date = suggestSecondArrivalDate();
    }

    state.values.forEach((row, index) => {
      row.date = clampDate(toISO(row.date));

      if (index > 0) {
        const previousDate = state.values[index - 1]?.date;
        if (previousDate && (!row.date || row.date <= previousDate)) {
          row.date = nextDay(previousDate);
        }
      }

      row.count = Math.max(0, Math.floor(Number(row.count) || 0));
    });
  }

  function render() {
    const rows = $('rows');
    rows.innerHTML = '';

    $('meta').textContent =
      `${fromISOToNice(state.startDate) || 'Start'} — ${fromISOToNice(state.endDate) || 'End'} • ${workerLabel()} workers`;

    state.values.forEach((row, index) => {
      const tr = document.createElement('tr');

      const dateCell = document.createElement('td');
      const dateInput = document.createElement('input');
      dateInput.type = 'date';

      const previousDate = index > 0 ? state.values[index - 1]?.date : '';
      const minDate = index === 0 ? state.startDate : (previousDate ? nextDay(previousDate) : state.startDate);

      if (minDate) dateInput.min = minDate;
      if (state.endDate) dateInput.max = state.endDate;

      dateInput.value = row.date || '';
      dateInput.addEventListener('change', () => {
        row.date = normalizeChangedDate(dateInput.value, index);
        render();
        validateAndSend();
      });

      dateCell.appendChild(dateInput);

      const countCell = document.createElement('td');
      const countInput = document.createElement('input');
      countInput.type = 'number';
      countInput.min = '0';
      countInput.step = '1';
      countInput.placeholder = '0';
      countInput.value = row.count ?? '';
      countInput.classList.toggle('zero', Number(row.count || 0) === 0);

      countInput.addEventListener('input', () => {
        row.count = normalizeChangedCount(countInput.value, index);
        countInput.value = String(row.count);
        countInput.classList.toggle('zero', row.count === 0);
        updateTotalsOnly();
        validateAndSend();
      });

      countCell.appendChild(countInput);

      const actionCell = document.createElement('td');
      actionCell.className = 'row-actions';

      const removeButton = document.createElement('button');
      removeButton.type = 'button';
      removeButton.className = 'btn danger';
      removeButton.textContent = 'Remove';
      removeButton.disabled = state.values.length <= state.minRows;
      removeButton.addEventListener('click', () => {
        if (state.values.length <= state.minRows) return;
        state.values.splice(index, 1);
        render();
        validateAndSend();
      });

      actionCell.appendChild(removeButton);
      tr.append(dateCell, countCell, actionCell);
      rows.appendChild(tr);
    });

    updateTotalsOnly();
  }

  function updateTotalsOnly() {
    $('totalSelected').textContent = String(sum());
    $('totalAllowed').textContent = workerLabel();
    $('addRow').disabled = atWorkerCap();
  }

  function normalizeChangedDate(value, index) {
    let iso = clampDate(toISO(value));

    if (index > 0) {
      const previousDate = state.values[index - 1]?.date;
      if (previousDate && (!iso || iso <= previousDate)) {
        iso = nextDay(previousDate);
      }
    }

    return iso || '';
  }

  function normalizeChangedCount(value, index) {
    const current = Number(state.values[index]?.count) || 0;
    const totalBefore = sum() - current;
    const remaining =
      state.totalWorkers == null
        ? Infinity
        : Math.max(0, state.totalWorkers - totalBefore);

    const next = Math.max(0, Math.floor(Number(value) || 0));
    return state.totalWorkers == null ? next : Math.min(next, remaining);
  }

  function addRow() {
    if (atWorkerCap()) return;

    state.values.push({ date: '', count: 0 });
    render();
    validateAndSend();
  }

  function validationErrors() {
    const errors = [];

    if (state.totalWorkers == null) {
      errors.push('Requested worker count is still loading.');
    }

    for (let i = 0; i < state.values.length; i++) {
      const row = state.values[i];

      if (!row.date) {
        errors.push('All rows must have a date.');
        break;
      }

      if (state.startDate && row.date < state.startDate) {
        errors.push('A date is before the job start date.');
        break;
      }

      if (state.endDate && row.date > state.endDate) {
        errors.push('A date is after the job end date.');
        break;
      }

      if (i > 0 && row.date <= state.values[i - 1].date) {
        errors.push('Dates must be strictly increasing with no duplicates.');
        break;
      }
    }

    if (state.values.length < state.minRows) {
      errors.push('At least two arrival rows are required.');
    }

    if (state.totalWorkers != null && sum() !== state.totalWorkers) {
      errors.push(`Total selected (${sum()}) must equal requested (${state.totalWorkers}).`);
    }

    return errors;
  }

  function serialize() {
    return state.values.map((row) => ({
      date: row.date,
      count: Number(row.count) || 0
    }));
  }

  function validateAndSend() {
    const errors = validationErrors();
    const value = JSON.stringify(serialize());
    const payloadKey = JSON.stringify({ value, valid: errors.length === 0, message: errors[0] || '' });

    $('status').innerHTML = errors.length
      ? `<span class="error">${errors[0]}</span>`
      : 'Looks good. You can submit the form.';

    if (payloadKey === lastSentPayload) return;
    lastSentPayload = payloadKey;

    try {
      JFCustomWidget.sendData({
        value,
        valid: errors.length === 0,
        message: errors[0] || ''
      });
    } catch (_) {}
  }

  function bindFieldListeners(qid, handler, { includeDateParts = false } = {}) {
    if (!qid || typeof JFCustomWidget.listenFromField !== 'function') return;

    selectorsFor(qid, { includeDateParts }).forEach((selector) => {
      ['change', 'input', 'blur'].forEach((eventName) => {
        try {
          JFCustomWidget.listenFromField(selector, eventName, handler);
        } catch (_) {}
      });
    });
  }

  function bindVisibilityRefresh() {
    if (!sourceIds.visibility || typeof JFCustomWidget.listenFromField !== 'function') return;

    const refresh = () => {
      refreshFromSourceFields();
      setTimeout(refreshFromSourceFields, 250);
      setTimeout(refreshFromSourceFields, 750);
    };

    bindFieldListeners(sourceIds.visibility, refresh);
  }

  function init() {
    sourceIds.start = toQID(JFCustomWidget.getWidgetSetting('startFieldId'));
    sourceIds.end = toQID(JFCustomWidget.getWidgetSetting('endFieldId'));
    sourceIds.workers = toQID(JFCustomWidget.getWidgetSetting('totalWorkersFieldId'));
    sourceIds.visibility = toQID(JFCustomWidget.getWidgetSetting('visibilityTriggerFieldId'));

    ensureMinRows();
    render();
    validateAndSend();

    refreshFromSourceFields();

    bindFieldListeners(sourceIds.start, refreshFromSourceFields, { includeDateParts: true });
    bindFieldListeners(sourceIds.end, refreshFromSourceFields, { includeDateParts: true });
    bindFieldListeners(sourceIds.workers, refreshFromSourceFields);
    bindVisibilityRefresh();

    setTimeout(refreshFromSourceFields, 500);
  }

  $('addRow').addEventListener('click', addRow);

  JFCustomWidget.subscribe('ready', init);

  JFCustomWidget.subscribe('submit', function () {
    const errors = validationErrors();

    JFCustomWidget.sendSubmit({
      valid: errors.length === 0,
      value: JSON.stringify(serialize())
    });
  });
})();
</script>
</body>
</html>
